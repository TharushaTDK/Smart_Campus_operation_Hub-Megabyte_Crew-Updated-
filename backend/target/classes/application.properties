# ── Suppress Thymeleaf warning (no templates — we use React) ───────────
spring.thymeleaf.check-template-location=false

# ── Session cookie — works on HTTP dev server ──────────────────────────
# SameSite=Lax: cookie IS sent for top-level navigation (covers Google OAuth callback)
# SameSite=None would require HTTPS — Chrome/Edge drop it silently on plain HTTP
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ── Logging ────────────────────────────────────────────────────────────
